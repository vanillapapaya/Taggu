<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0F0F0F">
    <meta name="color-scheme" content="dark">
    <title>Yoink</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { scrollbar-gutter: stable; }

        :root {
            --bg: #0F0F0F;
            --bg-elev: #1F1F1F;
            --bg-card: #272727;
            --border: #3F3F3F;
            --border-strong: #525252;
            --text: #F1F1F1;
            --text-dim: #C6C6C6;
            --text-muted: #8C8C8C;
            --accent: #FFDD88;
            --accent-hover: #FFE5A0;
            --accent-text: #0F0F0F;
            --char: #FF8899;
            --char-bg: rgba(255,136,153,0.16);
            --work: #77DD77;
            --work-bg: rgba(119,221,119,0.16);
            --fav: #77BBDD;
            --fav-bg: rgba(119,187,221,0.18);
            --user: #7777AA;
            --user-bg: rgba(119,119,170,0.22);
            --tag-bg: #3F3F3F;
            --success: #77DD77;
            --warn: #FFDD88;
            --error: #E04A5D;
            --radius: 12px;
            --radius-sm: 8px;
            --radius-pill: 999px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', 'Pretendard', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(15,15,15,0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .header-inner {
            max-width: 1400px;
            margin: 0 auto;
            padding: 18px 28px 12px;
            display: flex;
            align-items: center;
            gap: 24px;
        }

        h1 {
            font-size: 17px;
            font-weight: 600;
            letter-spacing: -0.01em;
            color: var(--text);
            white-space: nowrap;
        }

        .search-box {
            flex: 1;
            display: flex;
            gap: 6px;
        }

        .search-box input {
            flex: 1;
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg-elev);
            color: var(--text);
            font-size: 13px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.15s, background 0.15s;
            height: 32px;
        }
        .search-box input:focus { border-color: var(--accent); background: var(--bg-card); }
        .search-box input::placeholder { color: var(--text-muted); }

        .search-box button {
            padding: 0 14px;
            height: 32px;
            background: var(--accent);
            color: var(--accent-text);
            border: none;
            border-radius: var(--radius-sm);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
        }
        .search-box button:hover { background: var(--accent-hover); }
        .search-box button.secondary {
            background: var(--bg-elev);
            color: var(--text-dim);
            border: 1px solid var(--border);
        }
        .search-box button.secondary:hover {
            background: var(--bg-card);
            color: var(--text);
            border-color: var(--border-strong);
        }
        .search-box button.home-btn {
            background: transparent;
            color: var(--text-dim);
            border: 1px solid var(--border);
            padding: 0 10px;
            font-size: 17px;
            line-height: 1;
        }
        .search-box button.home-btn:hover {
            background: var(--bg-elev);
            color: var(--text);
            border-color: var(--border-strong);
        }

        .stats {
            font-size: 13px;
            color: var(--text-dim);
            white-space: nowrap;
        }

        .view-tabs {
            display: flex;
            gap: 2px;
            background: var(--bg-elev);
            padding: 4px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
        }
        .view-tabs button {
            padding: 6px 12px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.15s, color 0.15s;
            font-family: inherit;
        }
        .view-tabs button:hover { color: var(--text-dim); }
        .view-tabs button.active { background: var(--bg-card); color: var(--text); }

        .filter-bar {
            /* header 안에 있어 자동으로 sticky에 포함됨 — 별도 position 불필요 */
            border-top: 1px solid var(--border);
        }
        .filter-bar.collapsed { display: none; }

        .filter-toggle {
            padding: 5px 12px;
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
            border-radius: var(--radius-pill);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            transition: background 0.12s, color 0.12s, border-color 0.12s;
        }
        .filter-toggle:hover {
            color: var(--text);
            border-color: var(--border-strong);
        }
        .filter-toggle.has-active {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--accent-text);
        }
        .filter-toggle-count {
            font-size: 10px;
            font-weight: 700;
            padding: 1px 6px;
            background: var(--bg);
            color: var(--text);
            border-radius: 10px;
            min-width: 14px;
            text-align: center;
            line-height: 1.4;
        }
        .filter-toggle.has-active .filter-toggle-count {
            background: rgba(0,0,0,0.2);
            color: var(--accent-text);
        }
        .filter-chips {
            max-width: 1400px;
            margin: 0 auto;
            padding: 8px 28px 10px;
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: nowrap;
            overflow-x: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }
        .filter-chips::-webkit-scrollbar {
            height: 4px;
        }
        .filter-chips::-webkit-scrollbar-track { background: transparent; }
        .filter-chips::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }
        .filter-chips::-webkit-scrollbar-thumb:hover {
            background: var(--border-strong);
        }
        .filter-chips .chip { flex-shrink: 0; }
        .filter-chips .filter-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-right: 4px;
            flex-shrink: 0;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }
        .filter-chips .chip {
            padding: 5px 11px;
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
            border-radius: var(--radius-pill);
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.12s, color 0.12s, border-color 0.12s;
            font-family: inherit;
        }
        .filter-chips .chip:hover {
            color: var(--text-dim);
            border-color: var(--border-strong);
        }
        .filter-chips .chip.active {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--accent-text);
        }
        .filter-chips .chip span {
            opacity: 0.7;
            margin-left: 2px;
        }
        .filter-chips .chip-clear {
            color: var(--text-muted);
            border-style: dashed;
        }
        .filter-chips .chip-clear:hover {
            color: var(--error);
            border-color: var(--error);
        }

        .header-actions {
            display: flex;
            gap: 4px;
            align-items: center;
        }
        .icon-action {
            width: 32px;
            height: 32px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            border-radius: var(--radius-sm);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            line-height: 1;
            padding: 0;
            transition: background 0.15s, color 0.15s, transform 0.1s;
            font-family: inherit;
        }
        .icon-action:hover {
            background: var(--bg-elev);
            color: var(--text);
        }
        .icon-action:active { transform: scale(0.94); }
        .icon-action.active {
            background: var(--bg-elev);
            color: var(--accent);
        }
        .icon-action.danger:hover {
            background: rgba(224,74,93,0.15);
            color: var(--error);
        }
        body:not(.dev-mode) .dev-only { display: none !important; }

        .icon-action.error-badge {
            color: var(--error);
            font-weight: 700;
            position: relative;
        }
        .icon-action.error-badge:hover {
            background: rgba(224,74,93,0.15);
            color: var(--error);
        }
        .icon-action.error-badge[data-count]::after {
            content: attr(data-count);
            position: absolute;
            top: 2px;
            right: 2px;
            background: var(--error);
            color: #fff;
            font-size: 9px;
            font-weight: 700;
            padding: 0 4px;
            border-radius: 8px;
            line-height: 1.4;
            min-width: 12px;
            text-align: center;
        }

        .error-row {
            padding: 8px 0;
            border-top: 1px solid var(--border);
        }
        .error-row:first-child { border-top: none; }
        .error-row .err-time {
            color: var(--text-muted);
            font-size: 10px;
            font-family: ui-monospace, monospace;
        }
        .error-row .err-msg {
            color: var(--text);
            margin-top: 2px;
            word-break: break-word;
        }
        .error-row .err-ctx {
            color: var(--text-muted);
            font-size: 11px;
            margin-top: 2px;
        }


        .popover {
            position: fixed;
            top: 70px;
            right: 28px;
            background: var(--bg-card);
            border: 1px solid var(--border-strong);
            border-radius: var(--radius);
            padding: 18px 20px;
            min-width: 320px;
            max-width: 420px;
            box-shadow: 0 16px 40px rgba(0,0,0,0.55);
            z-index: 250;
            font-size: 13px;
            color: var(--text-dim);
        }
        .popover h4 {
            color: var(--text);
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
        }
        .popover dl {
            display: grid;
            grid-template-columns: 130px 1fr;
            gap: 8px 14px;
            margin: 0;
        }
        .popover dt {
            color: var(--text-muted);
            font-size: 12px;
        }
        .popover dd {
            color: var(--text);
            margin: 0;
            font-size: 13px;
        }
        .popover kbd {
            background: var(--bg-elev);
            border: 1px solid var(--border);
            border-bottom-width: 2px;
            border-radius: 4px;
            padding: 1px 7px;
            font-family: ui-monospace, 'SF Mono', Menlo, monospace;
            font-size: 11px;
            color: var(--text);
            margin: 0 2px;
        }

        .toolbar {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 28px 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .toolbar-row {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .toolbar-spacer { flex: 1; }
        .maint-item {
            display: block;
            width: 100%;
            text-align: left;
            padding: 8px 12px;
            background: transparent;
            color: var(--text-dim);
            border: none;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            margin: 0;
        }
        .maint-item:hover { background: var(--bg-elev); color: var(--text); }

        .toolbar input {
            flex: 1;
            padding: 6px 12px;
            height: 32px;
            border: 1px solid var(--border);
            background: var(--bg-elev);
            color: var(--text);
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-family: inherit;
            letter-spacing: 0.005em;
            outline: none;
            transition: border-color 0.15s;
        }
        .toolbar input:focus { border-color: var(--border-strong); }

        .toolbar button {
            padding: 0 14px;
            height: 32px;
            border: 1px solid var(--border);
            background: var(--bg-elev);
            color: var(--text-dim);
            border-radius: var(--radius-sm);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
        }
        .toolbar button:hover { background: var(--bg-card); color: var(--text); border-color: var(--border-strong); }
        .toolbar button.primary { background: var(--accent); border-color: var(--accent); color: var(--accent-text); }
        .toolbar button.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); color: var(--accent-text); }
        .toolbar button:disabled { background: var(--bg-elev); color: var(--text-muted); cursor: not-allowed; }

        .progress {
            max-width: 1400px;
            margin: 0 auto;
            padding: 12px 28px 14px;
            border-top: 1px solid var(--border);
            font-size: 12px;
            color: var(--accent);
        }

        .progress-text {
            font-family: ui-monospace, 'SF Mono', Menlo, monospace;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .progress-bar {
            height: 3px;
            background: var(--border);
            margin-top: 8px;
            border-radius: var(--radius-pill);
            overflow: hidden;
        }
        .progress-bar > div {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress.done .progress-text { color: var(--success); }
        .progress.done .progress-bar > div { background: var(--success); }
        .progress.error .progress-text { color: var(--error); }
        .progress.error .progress-bar > div { background: var(--error); }

        .folder-panel {
            max-width: 1400px;
            margin: 0 auto;
            padding: 16px 28px 20px;
            border-top: 1px solid var(--border);
        }

        .folder-empty {
            color: var(--text-muted);
            font-size: 13px;
            padding: 12px;
            text-align: center;
        }

        .folder-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            margin-bottom: 8px;
            gap: 16px;
        }

        .folder-info { flex: 1; min-width: 0; }
        .folder-path {
            color: var(--text);
            font-family: ui-monospace, 'SF Mono', Menlo, monospace;
            font-size: 13px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .folder-meta {
            color: var(--text-muted);
            font-size: 12px;
            margin-top: 4px;
        }

        .folder-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }

        main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 32px 28px 64px;
        }

        .status {
            text-align: center;
            padding: 64px 24px;
            color: var(--text-muted);
            font-size: 14px;
        }
        .status-bottom {
            padding: 24px 24px 48px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .guide-modal {
            flex-direction: column;
            max-width: 480px;
            width: 100%;
            max-height: 86vh;
        }
        .guide-body {
            padding: 40px 36px 28px;
            text-align: center;
            min-height: 360px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow-y: auto;
        }
        .guide-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 18px;
            letter-spacing: -0.01em;
        }
        .guide-text {
            font-size: 14px;
            color: var(--text-dim);
            line-height: 1.7;
            max-width: 380px;
            margin: 0 auto;
        }
        .guide-text strong {
            color: var(--accent);
            font-weight: 600;
        }
        .guide-text .hilight {
            background: rgba(255,221,136,0.16);
            color: var(--text);
            padding: 1px 6px;
            border-radius: 4px;
            font-weight: 500;
        }
        .guide-foot {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px 18px;
            border-top: 1px solid var(--border);
            gap: 12px;
        }
        .guide-foot button {
            padding: 0 18px;
            height: 36px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--bg-elev);
            color: var(--text-dim);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.15s, color 0.15s;
        }
        .guide-foot button:hover { background: var(--bg-card); color: var(--text); }
        .guide-foot button.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--accent-text);
        }
        .guide-foot button.primary:hover { background: var(--accent-hover); }
        .guide-foot button:disabled { opacity: 0.35; cursor: not-allowed; background: var(--bg-elev); color: var(--text-dim); }
        .guide-dots {
            display: flex;
            gap: 6px;
        }
        .guide-dots .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--border);
            transition: background 0.15s, transform 0.15s;
        }
        .guide-dots .dot.active {
            background: var(--accent);
            transform: scale(1.3);
        }

        .settings-modal {
            flex-direction: column;
            max-width: 560px;
            width: 100%;
            max-height: 86vh;
        }
        .settings-body {
            padding: 24px 28px;
            overflow-y: auto;
        }
        .settings-body h3 {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--text);
        }
        .settings-body .settings-sub {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 18px;
        }
        .settings-section {
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 14px 16px;
            margin-bottom: 12px;
            background: var(--bg-elev);
        }
        .settings-section.active {
            border-color: var(--accent);
            background: rgba(255,221,136,0.06);
        }
        .settings-section .sec-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            cursor: pointer;
        }
        .settings-section .sec-head h4 {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .settings-section .sec-head .sec-badge {
            font-size: 10px;
            font-weight: 500;
            color: var(--text-muted);
            background: var(--bg-card);
            padding: 2px 8px;
            border-radius: var(--radius-pill);
        }
        .settings-section.active .sec-head .sec-badge {
            color: var(--accent-text);
            background: var(--accent);
        }
        .settings-section input[type="radio"] {
            accent-color: var(--accent);
        }
        .settings-row {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-top: 8px;
        }
        .settings-row label {
            min-width: 80px;
            font-size: 12px;
            color: var(--text-dim);
        }
        .settings-row input, .settings-row select {
            flex: 1;
            padding: 6px 10px;
            height: 30px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            border-radius: var(--radius-sm);
            font-size: 12px;
            font-family: inherit;
            outline: none;
        }
        .settings-row input:focus, .settings-row select:focus {
            border-color: var(--accent);
        }
        .settings-row input[type="password"], .settings-row input.api-key {
            font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
        }
        .settings-note {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 6px;
            padding-left: 88px;
        }
        .settings-foot {
            display: flex;
            gap: 8px;
            margin-top: 18px;
            padding-top: 14px;
            border-top: 1px solid var(--border);
        }
        .settings-foot button {
            padding: 0 16px;
            height: 34px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--bg-elev);
            color: var(--text-dim);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.15s, color 0.15s;
        }
        .settings-foot button:hover { background: var(--bg-card); color: var(--text); }
        .settings-foot button.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--accent-text);
            margin-left: auto;
        }
        .settings-foot button.primary:hover { background: var(--accent-hover); }
        .settings-foot button:disabled { opacity: 0.5; cursor: not-allowed; }
        .settings-dev-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 16px;
            padding: 10px 12px;
            background: var(--bg-elev);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 12px;
            color: var(--text-dim);
            cursor: pointer;
        }
        .settings-dev-toggle input { accent-color: var(--accent); }
        .settings-dev-toggle .settings-dev-note {
            color: var(--text-muted);
            font-size: 11px;
        }
        .settings-status {
            font-size: 12px;
            margin-top: 10px;
            min-height: 18px;
        }
        .settings-status.ok { color: var(--success); }
        .settings-status.err { color: var(--error); }
        .settings-status.busy { color: var(--accent); }

        .page-credit {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 28px 16px;
            text-align: right;
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 0.02em;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 18px;
        }

        .card {
            position: relative;
            background: var(--bg-card);
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--border);
            transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
            cursor: pointer;
        }

        .card:hover {
            border-color: var(--border-strong);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.35);
        }

        .card.matched {
            border-color: var(--accent);
            box-shadow: 0 0 0 1px var(--accent), 0 8px 24px rgba(255,221,136,0.18);
        }

        .card img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            display: block;
            background: var(--bg-elev);
        }

        .card-info { padding: 12px 14px 14px; position: relative; }

        .card-filename {
            position: absolute;
            bottom: 100%;
            left: 0;
            right: 0;
            padding: 26px 14px 10px;
            background: linear-gradient(to top, rgba(0,0,0,0.78), rgba(0,0,0,0));
            color: var(--text);
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            opacity: 0;
            transition: opacity 0.15s;
            pointer-events: none;
            z-index: 1;
        }
        .card:hover .card-filename { opacity: 1; }
        .filename-text {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            min-width: 0;
            flex: 1;
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }
        .card-info .card-tags {
            flex-wrap: nowrap;
            overflow: hidden;
            -webkit-mask-image: linear-gradient(to right, black calc(100% - 24px), transparent);
            mask-image: linear-gradient(to right, black calc(100% - 24px), transparent);
        }
        .card-info .card-tags .tag { flex-shrink: 0; }

        .tag {
            background: var(--tag-bg);
            color: var(--text);
            padding: 3px 10px;
            border-radius: var(--radius-pill);
            font-size: 12px;
            line-height: 1.5;
            font-weight: 400;
        }
        .tag.char {
            background: var(--char-bg);
            color: var(--char);
            font-weight: 600;
        }
        .tag.work {
            background: var(--work-bg);
            color: var(--work);
        }
        .tag.user {
            background: var(--user-bg);
            color: var(--user);
            font-weight: 600;
        }
        .tag .tag-x {
            display: inline-block;
            margin-left: 0;
            max-width: 0;
            overflow: hidden;
            opacity: 0;
            cursor: pointer;
            font-weight: 700;
            white-space: nowrap;
            transition: max-width 0.18s ease, margin-left 0.18s ease, opacity 0.15s ease;
        }
        .tag:hover .tag-x {
            max-width: 18px;
            margin-left: 6px;
            opacity: 0.65;
        }
        .tag .tag-x:hover { opacity: 1; color: var(--error); }
        .card-info .tag.clickable {
            cursor: pointer;
            transition: filter 0.12s, transform 0.1s;
        }
        .card-info .tag.clickable:hover {
            filter: brightness(1.25);
        }
        .card-info .tag.clickable:active {
            transform: scale(0.95);
        }
        .tag-label.editing {
            outline: 1px solid var(--accent);
            outline-offset: 1px;
            border-radius: 3px;
            background: var(--bg);
            color: var(--text);
            cursor: text;
            padding: 0 3px;
        }
        .tag.user .tag-label.editing {
            outline-color: var(--user);
            color: var(--user);
        }
        .tag.char .tag-label.editing {
            outline-color: var(--char);
            color: var(--char);
        }
        .tag.work .tag-label.editing {
            outline-color: var(--work);
            color: var(--work);
        }
        /* 드래그 앤 드롭 */
        .modal-info .card-tags[data-drop-zone] {
            min-height: 32px;
            padding: 4px;
            margin-left: -4px;
            margin-right: -4px;
            border-radius: var(--radius-sm);
            transition: background 0.12s, outline 0.12s;
            outline: 2px dashed transparent;
        }
        .modal-info .card-tags.drop-target {
            background: var(--bg-elev);
            outline-color: var(--accent);
        }
        .modal-info .tag[draggable="true"] {
            cursor: grab;
        }
        .modal-info .tag[draggable="true"]:active {
            cursor: grabbing;
        }

        .tag-editor {
            margin: 12px 0 14px;
        }

        .char-suggest {
            padding: 8px 10px;
            background: rgba(255,221,136,0.06);
            border: 1px dashed var(--border-strong);
            border-radius: var(--radius-sm);
        }
        .char-suggest-label {
            font-size: 10px;
            color: var(--text-muted);
            margin-bottom: 6px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }
        .char-suggest-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }
        .suggest-chip {
            background: var(--bg-elev);
            color: var(--char);
            border: 1px solid var(--char-bg);
            padding: 3px 9px;
            border-radius: var(--radius-pill);
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            transition: background 0.12s, border-color 0.12s, transform 0.1s;
        }
        .suggest-chip:hover {
            background: var(--char-bg);
            border-color: var(--char);
        }
        .suggest-chip:active { transform: scale(0.95); }
        .suggest-chip:disabled { opacity: 0.5; cursor: default; }
        .suggest-chip .suggest-pct {
            font-size: 9px;
            color: var(--text-muted);
            font-weight: 400;
        }
        .tag-editor-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .tag-editor-row {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }
        .tag-editor-row input {
            flex: 1;
            padding: 8px 12px;
            background: var(--bg-elev);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 12px;
            outline: none;
            font-family: inherit;
        }
        .tag-editor-row input:focus { border-color: var(--accent); }
        .tag-editor-row button {
            padding: 8px 14px;
            background: var(--accent);
            color: var(--accent-text);
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            font-family: inherit;
        }
        .tag-editor-row button:hover { background: var(--accent-hover); }

        .card-desc {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 8px;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-actions {
            position: absolute;
            top: 10px;
            left: 10px;
            display: flex;
            gap: 6px;
            z-index: 2;
            opacity: 0;
            transition: opacity 0.15s;
        }
        .card:hover .card-actions { opacity: 1; }
        .card.favorited .card-actions,
        .card.hidden-card .card-actions { opacity: 1; }

        .icon-btn {
            width: 30px;
            height: 30px;
            background: rgba(0,0,0,0.65);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            line-height: 1;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: background 0.15s, color 0.15s, border-color 0.15s, transform 0.1s;
            padding: 0;
        }
        .icon-btn:hover { background: var(--accent); border-color: var(--accent); color: var(--accent-text); }
        .icon-btn:active { transform: scale(0.92); }
        .icon-btn.fav.active { background: var(--fav); border-color: var(--fav); color: var(--accent-text); }
        .icon-btn.hide:hover { background: var(--error); border-color: var(--error); }
        .icon-btn.show:hover { background: var(--success); border-color: var(--success); color: var(--accent-text); }

        .card.hidden-card { opacity: 0.6; filter: grayscale(0.5); }
        .card.hidden-card:hover { opacity: 0.95; filter: grayscale(0); }
        .card.favorited { border-color: var(--fav); box-shadow: 0 0 0 1px var(--fav); }
        .card.favorited.matched { box-shadow: 0 0 0 1px var(--accent), 0 8px 24px rgba(255,221,136,0.18); border-color: var(--accent); }

        .score-badge {
            font-size: 11px;
            color: var(--accent);
            font-weight: 600;
            flex-shrink: 0;
        }

        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.6);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.08);
            padding: 6px 12px;
            border-radius: var(--radius-sm);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.15s, background 0.15s;
            z-index: 2;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .card:hover .copy-btn { opacity: 1; }
        .copy-btn:hover { background: var(--accent); color: var(--accent-text); }
        .copy-btn:disabled { background: rgba(0,0,0,0.4); cursor: default; }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.78);
            z-index: 200;
            justify-content: center;
            align-items: center;
            padding: 40px;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }

        .modal-overlay.active { display: flex; }

        .modal-content {
            max-width: 1100px;
            max-height: 90vh;
            display: flex;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 24px 64px rgba(0,0,0,0.5);
        }

        .modal-img {
            max-width: 720px;
            max-height: 90vh;
            object-fit: contain;
            background: var(--bg);
        }

        .modal-info {
            padding: 28px;
            min-width: 280px;
            max-width: 380px;
            overflow-y: auto;
        }

        .modal-info h3 {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 16px;
            word-break: break-all;
            color: var(--text);
            line-height: 1.4;
        }

        .modal-info .card-tags { margin-bottom: 12px; }
        .modal-info .card-desc {
            -webkit-line-clamp: unset;
            color: var(--text-dim);
            margin-top: 12px;
            font-size: 13px;
        }

        .modal-copy-btn {
            display: block;
            width: 100%;
            padding: 11px 16px;
            background: var(--accent);
            color: var(--accent-text);
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            margin: 12px 0 16px;
            transition: background 0.15s;
        }
        .modal-copy-btn:hover { background: var(--accent-hover); }
        .modal-copy-btn:disabled { background: var(--bg-elev); color: var(--text-muted); cursor: default; }

        .modal-action-btn {
            flex: 1;
            padding: 9px 12px;
            background: var(--bg-elev);
            color: var(--text-dim);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
            font-family: inherit;
        }
        .modal-action-btn:hover { background: var(--bg-card); color: var(--text); border-color: var(--border-strong); }
        .modal-action-btn.active-fav { background: var(--fav-bg); color: var(--fav); border-color: var(--fav); }
        .modal-action-btn.active-hide { background: rgba(224,74,93,0.15); color: var(--error); border-color: var(--error); }

        .modal-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.5);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 22px;
            cursor: pointer;
            z-index: 220;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
            transition: background 0.15s;
        }
        .modal-nav:hover { background: var(--accent); color: var(--accent-text); }
        .modal-nav:disabled { opacity: 0.3; cursor: default; background: rgba(0,0,0,0.5); }
        .modal-nav.prev { left: 16px; }
        .modal-nav.next { right: 16px; }

        .modal-counter {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.55);
            color: var(--text-dim);
            padding: 6px 12px;
            border-radius: var(--radius-pill);
            font-size: 12px;
            z-index: 220;
            backdrop-filter: blur(8px);
        }

        .card.selected {
            border-color: #6ea8d6;
            box-shadow: 0 0 0 2px #6ea8d6;
        }
        .card.selected.favorited { box-shadow: 0 0 0 2px #6ea8d6; }

        .bulk-bar {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-card);
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-pill);
            padding: 8px 8px 8px 18px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 8px 10px;
            max-width: calc(100vw - 32px);
            z-index: 150;
            box-shadow: 0 12px 32px rgba(0,0,0,0.5);
        }
        .bulk-bar button { white-space: nowrap; }
        .bulk-bar .bulk-count {
            color: var(--text);
            font-size: 13px;
            font-weight: 500;
        }
        .bulk-bar button {
            padding: 8px 14px;
            background: var(--bg-elev);
            color: var(--text-dim);
            border: 1px solid var(--border);
            border-radius: var(--radius-pill);
            font-size: 12px;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.15s, color 0.15s;
        }
        .bulk-bar button:hover { background: var(--bg-card); color: var(--text); }
        .bulk-bar button.danger:hover { background: var(--error); color: #fff; border-color: var(--error); }
        .bulk-bar button.primary { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }
        .bulk-bar button.primary:hover { background: var(--accent-hover); }

        .load-more {
            display: block;
            margin: 40px auto 0;
            padding: 11px 32px;
            background: transparent;
            color: var(--text-dim);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s, color 0.15s;
        }
        .load-more:hover { background: var(--bg-elev); border-color: var(--border-strong); color: var(--text); }

        ::-webkit-scrollbar { width: 12px; height: 12px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 6px; border: 3px solid var(--bg); }
        ::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }

        @media (max-width: 768px) {
            .header-inner { flex-wrap: wrap; padding: 14px 18px 10px; gap: 12px; }
            .toolbar { flex-wrap: wrap; padding: 0 18px 14px; }
            .filter-chips { padding: 8px 18px 10px; }
            .stats { display: none; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
            main { padding: 20px 18px 48px; }
            .modal-overlay { padding: 16px; }
            .modal-content { flex-direction: column; max-height: 95vh; }
            .modal-img { max-width: 100%; max-height: 55vh; }
            .modal-info { max-width: 100%; padding: 20px; }
        }

        /* 세로가 더 긴 창 (portrait) — 이미지 위, 정보 아래로 stack */
        @media (orientation: portrait) {
            .modal-content { flex-direction: column; max-height: 95vh; max-width: 95vw; }
            .modal-img { max-width: 100%; max-height: 55vh; }
            .modal-info { max-width: 100%; padding: 20px; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-inner">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="검색어 입력" autofocus>
            <button class="secondary" onclick="doSearch()">검색</button>
            <button onclick="loadRandom()" title="랜덤 5개">랜덤</button>
            <button class="home-btn" onclick="goHome()" title="처음 화면으로 (검색·필터 모두 초기화)">⌂</button>
        </div>
        <div class="view-tabs" id="viewTabs">
            <button class="active" data-view="all" onclick="setView('all')">전체 <span id="cntAll"></span></button>
            <button data-view="favorite" onclick="setView('favorite')">★ <span id="cntFav"></span></button>
            <button data-view="hidden" onclick="setView('hidden')">숨김 <span id="cntHid"></span></button>
        </div>
        <button class="filter-toggle" id="filterToggle" onclick="toggleFilterBar()" title="필터 보이기/숨기기">
            필터 <span id="filterToggleCount" class="filter-toggle-count" style="display:none">0</span>
        </button>
        <div class="header-actions">
            <button class="icon-action" id="toolbarToggle" title="사진 추가 · 정리 도구" onclick="toggleToolbar()">⋯</button>
            <button class="icon-action" title="AI 설정" onclick="openSettings()">⚙</button>
            <button class="icon-action" title="사용 안내" onclick="openGuide()">?</button>
            <button class="icon-action error-badge" id="errorBadge" title="알림" onclick="togglePopoverMenu('errors')" style="display:none">!</button>
            <button class="icon-action" title="단축키 안내" onclick="togglePopoverMenu('shortcuts')">⌨</button>
            <button class="icon-action" title="현황 보기" onclick="togglePopoverMenu('info')">ℹ</button>
            <button class="icon-action dev-only" title="로그 보기" onclick="openLog()">▤</button>
            <button class="icon-action danger dev-only" title="다시 시작" onclick="restartServer()">↻</button>
        </div>
    </div>

    <div class="filter-bar" id="filterBar">
        <div class="filter-chips" id="filterChips">
            <span class="filter-label">필터</span>
            <button class="chip" data-filter="no_char" onclick="toggleFilter('no_char')" title="캐릭터가 안 잡힌 사진만">캐릭터 없음 <span id="cntNoChar"></span></button>
            <button class="chip" data-filter="no_user" onclick="toggleFilter('no_user')" title="내가 단 태그가 없는 사진만">내 태그 없음 <span id="cntNoUser"></span></button>
            <button class="chip" data-filter="no_ai" onclick="toggleFilter('no_ai')" title="AI 분석을 안 한 사진만">AI 태그 없음 <span id="cntNoAi"></span></button>
            <button class="chip chip-clear" id="filterClearBtn" onclick="clearFilters()" style="display:none">초기화</button>
        </div>
    </div>

    <div class="popover" id="shortcutsPopover" style="display:none">
        <h4>단축키</h4>
        <dl>
            <dt><kbd>←</kbd> <kbd>→</kbd></dt><dd>모달 이전/다음 이미지</dd>
            <dt><kbd>Esc</kbd></dt><dd>모달 닫기</dd>
            <dt><kbd>Ctrl</kbd> + 클릭</dt><dd>다중 선택 (일괄 작업)</dd>
            <dt><kbd>Shift</kbd> + 클릭</dt><dd>다중 선택</dd>
            <dt><kbd>Enter</kbd></dt><dd>검색 / 폴더 인덱싱</dd>
            <dt><kbd>R</kbd></dt><dd>랜덤 5개</dd>
            <dt><kbd>Ctrl</kbd> + <kbd>F5</kbd></dt><dd>강제 새로고침</dd>
        </dl>
    </div>

    <div class="popover" id="errorsPopover" style="display:none">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
            <h4 style="margin:0">최근 에러</h4>
            <button onclick="clearErrors()" style="background:transparent;border:1px solid var(--border);color:var(--text-dim);padding:3px 10px;border-radius:var(--radius-sm);font-size:11px;cursor:pointer;font-family:inherit">비우기</button>
        </div>
        <div id="errorsPopoverBody" style="max-height:320px;overflow-y:auto;font-size:12px;line-height:1.5"></div>
    </div>

    <div class="popover" id="infoPopover" style="display:none">
        <h4>정보</h4>
        <div id="infoPopoverBody">로딩 중...</div>
    </div>

    <div class="toolbar" id="toolbar" style="display:none">
        <div class="toolbar-row">
            <input type="text" id="folderInput" placeholder="이미지 폴더 경로">
            <button id="folderPickBtn" onclick="pickFolder()" title="컴퓨터에서 폴더 선택">폴더 고르기</button>
            <button id="indexBtn" class="primary" onclick="startIndex(false)" title="이 폴더의 새 사진들을 등록">새 이미지 추가</button>
        </div>
        <div class="toolbar-row">
            <button id="backfillBtn" onclick="startBackfill()" title="아직 캐릭터를 못 찾은 사진에 한번 더 시도">캐릭터 인식</button>
            <button id="aiBtn" onclick="startAIAnalysis()" title="AI가 사진을 보고 한국어 태그와 설명을 만듦">AI 분석</button>
            <button onclick="toggleFolderPanel()" title="등록된 폴더 목록 보기">폴더 목록</button>
            <div class="toolbar-spacer"></div>
            <button id="maintBtn" onclick="togglePopoverMenu('maint')" title="정리 도구 모음">유지보수 ▾</button>
        </div>
    </div>

    <div class="popover" id="maintPopover" style="display:none;padding:8px;min-width:200px">
        <div style="font-size:10px;color:var(--text-muted);padding:6px 12px 8px;line-height:1.4;border-bottom:1px solid var(--border);margin-bottom:6px">실행 전에 자동으로 백업이 만들어져요</div>
        <button class="maint-item" onclick="closeMaint(); startBackfillCcip()" title="기존 사진에 캐릭터 학습용 임베딩 채우기 (한 번만 실행)">기존 사진 학습 준비</button>
        <button class="maint-item" onclick="closeMaint(); startAutoTranslate()" title="새로 찾은 영어 캐릭터 이름을 AI가 한국어로 번역해서 등록">새 캐릭터 자동 번역</button>
        <button class="maint-item" onclick="closeMaint(); startRelocalize()" title="캐릭터 이름 사전을 다시 적용 (직접 단 태그는 유지)">이름 다시 적용</button>
        <button class="maint-item" onclick="closeMaint(); startDedupeTags()" title="같은 태그가 여러 번 들어간 것을 한 번씩만 남기기">중복 태그 정리</button>
        <button class="maint-item" onclick="closeMaint(); startCleanupLibrary()" title="같은 사진이 여러 번 등록된 것을 정리">라이브러리 중복 청소</button>
    </div>

    <div class="progress" id="progress" style="display:none">
        <div class="progress-text" id="progressText"></div>
        <div class="progress-bar"><div id="progressFill"></div></div>
    </div>

    <div class="folder-panel" id="folderPanel" style="display:none">
        <div id="folderList"></div>
    </div>
</header>

<main>
    <div id="grid" class="grid"></div>
    <button id="loadMore" class="load-more" style="display:none" onclick="loadMore()">더 보기</button>
    <div id="status" class="status status-bottom"></div>
</main>

<footer class="page-credit">Made by Vanillapapaya</footer>

<div class="modal-overlay" id="modal" onclick="closeModal(event)">
    <div class="modal-counter" id="modalCounter" onclick="event.stopPropagation()"></div>
    <button class="modal-nav prev" id="modalPrev" onclick="event.stopPropagation(); modalPrev()" title="이전 (←)">‹</button>
    <button class="modal-nav next" id="modalNext" onclick="event.stopPropagation(); modalNext()" title="다음 (→)">›</button>

        <div class="modal-info" id="modalInfo"></div>

<div class="modal-overlay" id="guideModal" onclick="closeGuide(event)">
    <div class="modal-content guide-modal" onclick="event.stopPropagation()">
        <div class="guide-body" id="guideBody"></div>
        <div class="guide-foot">

            <button id="guideNextBtn" class="primary" onclick="guideNext()">다음 →</button>

</div>

<div class="modal-overlay" id="settingsModal" onclick="closeSettings(event)">
    <div class="modal-content settings-modal" onclick="event.stopPropagation()">
        <div class="settings-body" id="settingsBody">로딩 중...</div>
    </div>
</div>

<div class="bulk-bar" id="bulkBar" style="display:none">
    <span class="bulk-count" id="bulkCount">0개 선택됨</span>
    <button onclick="bulkAction('favorite', true)">★ 즐겨찾기</button>
    <button onclick="bulkAction('favorite', false)">★ 해제</button>
    <button onclick="bulkAction('hidden', true)">✕ 숨기기</button>
    <button onclick="bulkAction('hidden', false)">↺ 표시</button>
    <button onclick="bulkAddTag()">+ 태그 추가</button>
    <button class="primary" onclick="clearSelection()">선택 해제</button>
</div>

<script>
const grid = document.getElementById('grid');
const status = document.getElementById('status');
const searchInput = document.getElementById('searchInput');
const loadMoreBtn = document.getElementById('loadMore');

let currentMode = 'browse';
let currentView = 'all';
const filterFlags = { no_char: false, no_user: false, no_ai: false };

function filterQueryString() {
    const parts = [];
    if (filterFlags.no_char) parts.push('no_char=1');
    if (filterFlags.no_user) parts.push('no_user=1');
    if (filterFlags.no_ai) parts.push('no_ai=1');
    return parts.length ? '&' + parts.join('&') : '';
}

function toggleFilter(name) {
    filterFlags[name] = !filterFlags[name];
    updateFilterUI();
    if (currentMode === 'search' && currentQuery) doSearch();
    else { currentMode = 'browse'; browseOffset = 0; grid.innerHTML = ''; cardData = []; loadBrowse(); }
}

function clearFilters() {
    filterFlags.no_char = filterFlags.no_user = filterFlags.no_ai = false;
    updateFilterUI();
    if (currentMode === 'search' && currentQuery) doSearch();
    else { currentMode = 'browse'; browseOffset = 0; grid.innerHTML = ''; cardData = []; loadBrowse(); }
}

function updateFilterUI() {
    let activeCount = 0;
    document.querySelectorAll('.filter-chips .chip[data-filter]').forEach(btn => {
        const k = btn.dataset.filter;
        const on = filterFlags[k];
        btn.classList.toggle('active', on);
        if (on) activeCount++;
    });
    document.getElementById('filterClearBtn').style.display = activeCount > 0 ? '' : 'none';

    const toggle = document.getElementById('filterToggle');
    const countEl = document.getElementById('filterToggleCount');
    toggle.classList.toggle('has-active', activeCount > 0);
    if (activeCount > 0) {
        countEl.textContent = activeCount;
        countEl.style.display = '';
    } else {
        countEl.style.display = 'none';
    }

    // 활성 필터가 있으면 row 자동 표시 (사용자가 가렸어도 무엇이 적용 중인지 보여야 함)
    const bar = document.getElementById('filterBar');
    const userWantsHidden = localStorage.getItem('yoink.filterBar') === 'hidden';
    const shouldShow = activeCount > 0 || !userWantsHidden;
    bar.classList.toggle('collapsed', !shouldShow);
}

function toggleFilterBar() {
    const bar = document.getElementById('filterBar');
    const currentlyHidden = bar.classList.contains('collapsed');
    if (currentlyHidden) {
        // 보이기
        localStorage.setItem('yoink.filterBar', 'visible');
        bar.classList.remove('collapsed');
    } else {
        // 숨기기 — 단, 활성 필터 있으면 막음 (사용자 보호)
        const anyActive = filterFlags.no_char || filterFlags.no_user || filterFlags.no_ai;
        if (anyActive) {
            // 활성 필터를 먼저 해제하지 않으면 숨길 수 없음
            return;
        }
        localStorage.setItem('yoink.filterBar', 'hidden');
        bar.classList.add('collapsed');
    }
}

// 첫 로드 시 마지막 상태 복원 (기본은 숨김)
(function initFilterBarVisibility() {
    if (localStorage.getItem('yoink.filterBar') === null) {
        localStorage.setItem('yoink.filterBar', 'hidden');
    }
    document.addEventListener('DOMContentLoaded', () => {
        updateFilterUI();
    });
})();
let browseOffset = 0;
let currentQuery = '';
const PAGE_SIZE = 40;

let pollTimer = null;
const isLocalAccess = {{ 'true' if is_local else 'false' }};
const canUseClipboardAPI = window.isSecureContext && !!navigator.clipboard && !!window.ClipboardItem;

let cardData = [];
let modalIndex = -1;
const selected = new Set();

window.addEventListener('DOMContentLoaded', async () => {
    try {
        const res = await fetch('/api/index/status');
        const s = await res.json();
        if (s.status === 'running' || s.status === 'loading_model') {
            pollProgress();
        }
    } catch {}
    loadFolders();
    loadCounts();
    loadBrowse();
    setupFolderDrop();
});

async function pickFolder() {
    const btn = document.getElementById('folderPickBtn');
    const oldText = btn.textContent;
    btn.disabled = true;
    btn.textContent = '선택 중...';
    try {
        const res = await fetch('/api/pick_folder', { method: 'POST' });
        const data = await res.json();
        if (!res.ok || data.error) {
            alert('오류: ' + (data.error || res.statusText));
            return;
        }
        if (data.path) {
            document.getElementById('folderInput').value = data.path;
            document.getElementById('folderInput').focus();
        }
    } catch (e) {
        alert('폴더 선택 실패: ' + e.message);
    } finally {
        btn.disabled = false;
        btn.textContent = oldText;
    }
}

function setupFolderDrop() {
    const input = document.getElementById('folderInput');
    const onDragOver = (e) => { e.preventDefault(); e.stopPropagation(); input.style.borderColor = 'var(--accent)'; };
    const onDragLeave = (e) => { input.style.borderColor = ''; };
    const onDrop = (e) => {
        e.preventDefault(); e.stopPropagation();
        input.style.borderColor = '';
        const dt = e.dataTransfer;
        if (!dt) return;
        // pywebview/Chromium은 보안상 file.path를 안 줌. 시도 후 실패 시 안내.
        let pathFound = null;
        if (dt.files && dt.files.length > 0) {
            const f = dt.files[0];
            if (f.path) pathFound = f.path;
        }
        if (pathFound) {
            input.value = pathFound;
            input.focus();
        } else {
            const isDesktop = !!(window.pywebview && window.pywebview.api);
            alert(isDesktop
                ? '브라우저 엔진(WebView2) 보안상 드롭 파일의 절대 경로를 가져올 수 없습니다.\n[폴더 선택] 버튼을 사용하세요.'
                : '드롭은 데스크톱 앱에서만 일부 동작합니다. 경로를 직접 입력하거나 [폴더 선택] 버튼을 사용하세요.');
        }
    };
    input.addEventListener('dragover', onDragOver);
    input.addEventListener('dragleave', onDragLeave);
    input.addEventListener('drop', onDrop);
}

function setView(view) {
    if (view === currentView) return;
    currentView = view;
    document.querySelectorAll('.view-tabs button').forEach(b => {
        b.classList.toggle('active', b.dataset.view === view);
    });
    if (currentMode === 'search' && currentQuery) {
        doSearch();
    } else {
        currentMode = 'browse';
        browseOffset = 0;
        grid.innerHTML = ''; cardData = [];
        loadBrowse();
    }
}

async function loadCounts() {
    try {
        const res = await fetch('/api/counts');
        const c = await res.json();
        document.getElementById('cntAll').textContent = c.all;
        document.getElementById('cntFav').textContent = c.favorite;
        document.getElementById('cntHid').textContent = c.hidden;
        document.getElementById('cntNoChar').textContent = c.no_char ?? '';
        document.getElementById('cntNoUser').textContent = c.no_user ?? '';
        document.getElementById('cntNoAi').textContent = c.no_ai ?? '';
        document.getElementById('stats') && (document.getElementById('stats').textContent = `${c.all}개`);
    } catch (e) {}
}

searchInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.isComposing && e.keyCode !== 229) doSearch();
});

document.getElementById('folderInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.isComposing && e.keyCode !== 229) startIndex(false);
});

document.addEventListener('keydown', (e) => {
    if (e.key !== 'r' && e.key !== 'R') return;
    if (e.ctrlKey || e.altKey || e.metaKey) return;
    if (e.isComposing || e.keyCode === 229) return;
    const t = e.target;
    if (!t) return;
    const tag = t.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA' || t.isContentEditable) return;
    if (document.getElementById('modal').classList.contains('active')) return;
    e.preventDefault();
    loadRandom();
});

function goHome() {
    searchInput.value = '';
    currentQuery = '';
    currentMode = 'browse';
    // 뷰 탭을 [전체]로
    currentView = 'all';
    document.querySelectorAll('.view-tabs button').forEach(b => {
        b.classList.toggle('active', b.dataset.view === 'all');
    });
    // 필터 칩 모두 해제
    filterFlags.no_char = filterFlags.no_user = filterFlags.no_ai = false;
    updateFilterUI();
    // 그리드 초기화 + 새로 로드
    browseOffset = 0;
    grid.innerHTML = '';
    cardData = [];
    loadBrowse();
    // 페이지 스크롤도 맨 위로
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function searchByTag(tag) {
    if (!tag) return;
    searchInput.value = tag;
    doSearch();
    // 검색 결과로 스크롤이 점프하지 않도록 헤더는 그대로 둠 (sticky)
}

async function doSearch() {
    const q = searchInput.value.trim();
    if (!q) {
        currentMode = 'browse';
        browseOffset = 0;
        grid.innerHTML = ''; cardData = [];
        loadBrowse();
        return;
    }

    currentMode = 'search';
    currentQuery = q;
    grid.innerHTML = ''; cardData = [];
    status.textContent = '검색 중...';
    loadMoreBtn.style.display = 'none';

    try {
        const res = await fetch(`/api/search?q=${encodeURIComponent(q)}&limit=${PAGE_SIZE}&view=${currentView}${filterQueryString()}`);
        const data = await res.json();

        if (data.results.length === 0) {
            const scanned = data.scanned ?? data.total ?? 0;
            status.innerHTML = `"${escapeHTML(q)}" 매치되는 태그/설명/캐릭터 없음 (검색 대상 ${scanned}장)<br><span style="font-size:12px;color:var(--text-muted)">힌트: 카드 클릭 → 모달 → [내 태그]에 직접 단어를 추가하면 다음부터 검색됩니다. 한국어 의미 검색은 지원하지 않습니다 — 텍스트가 매치되어야 합니다.</span>`;
            return;
        }

        status.textContent = `"${q}" 검색 결과 ${data.results.length}개`;
        data.results.forEach(item => grid.appendChild(createCard(item, true)));
    } catch (err) {
        status.textContent = '검색 오류: ' + err.message;
    }
}

async function loadRandom() {
    currentMode = 'random';
    currentQuery = '';
    grid.innerHTML = ''; cardData = [];
    status.textContent = '뽑는 중...';
    loadMoreBtn.style.display = 'none';
    try {
        const res = await fetch(`/api/random?n=5&view=${currentView}${filterQueryString()}`);
        const data = await res.json();
        if (!res.ok || data.error) { status.textContent = '오류: ' + (data.error || res.statusText); return; }
        if (data.results.length === 0) { status.textContent = '뽑을 이미지가 없습니다.'; return; }
        status.textContent = `랜덤 ${data.results.length}개`;
        data.results.forEach(item => grid.appendChild(createCard(item, false)));
    } catch (e) {
        status.textContent = '실패: ' + e.message;
    }
}

async function loadBrowse() {
    if (browseOffset === 0) status.textContent = '로딩 중...';

    try {
        const res = await fetch(`/api/browse?offset=${browseOffset}&limit=${PAGE_SIZE}&view=${currentView}${filterQueryString()}`);
        const data = await res.json();

        if (data.results.length === 0 && browseOffset === 0) {
            const anyFilter = filterFlags.no_char || filterFlags.no_user || filterFlags.no_ai;
            const msg = anyFilter ? '필터 조건에 맞는 이미지가 없습니다.'
                : currentView === 'favorite' ? '즐겨찾기한 이미지가 없습니다. 카드의 ★ 버튼으로 추가하세요.'
                : currentView === 'hidden' ? '숨김 처리한 이미지가 없습니다.'
                : '아직 추가된 이미지가 없습니다. 위쪽에 폴더 경로를 입력하고 [새 이미지 추가]를 누르세요.';
            status.textContent = msg;
            return;
        }

        if (browseOffset === 0) {
            const baseLabel = currentView === 'favorite' ? '즐겨찾기'
                : currentView === 'hidden' ? '숨김'
                : '전체';
            const activeChips = [];
            if (filterFlags.no_char) activeChips.push('캐릭터 없음');
            if (filterFlags.no_user) activeChips.push('내 태그 없음');
            if (filterFlags.no_ai) activeChips.push('AI 태그 없음');
            const filterLabel = activeChips.length ? ` · ${activeChips.join(', ')}` : '';
            status.textContent = `${baseLabel}${filterLabel} ${data.total}개`;
        }

        data.results.forEach(item => grid.appendChild(createCard(item, false)));
        browseOffset += data.results.length;

        loadMoreBtn.style.display = browseOffset < data.total ? 'block' : 'none';
    } catch (err) {
        status.textContent = '로딩 오류: ' + err.message;
    }
}

function loadMore() {
    if (currentMode === 'browse') loadBrowse();
}

function updateStats(total) {
    document.getElementById('stats').textContent = `${total}개 이미지`;
}

function createCard(item, showScore) {
    const idx = cardData.length;
    cardData.push(item);

    const card = document.createElement('div');
    let cls = 'card';
    if (item.matched) cls += ' matched';
    if (item.favorite) cls += ' favorited';
    if (item.hidden) cls += ' hidden-card';
    if (selected.has(item.id)) cls += ' selected';
    card.className = cls;
    card.dataset.id = item.id;
    card.dataset.idx = idx;
    card.onclick = (e) => {
        if (e.target.closest('.copy-btn') || e.target.closest('.icon-btn')) return;
        if (e.ctrlKey || e.metaKey || e.shiftKey) {
            e.preventDefault();
            toggleSelection(item.id, card);
            return;
        }
        openModalAt(idx);
    };

    const userTags = parseTags(item.user_tags);
    const charTags = parseTags(item.wd_chars_ko);
    const tags = parseTags(item.tags);
    const tagClick = (t) => `onclick="event.stopPropagation(); searchByTag('${escapeAttr(t)}')"`;
    const userHTML = userTags.slice(0, 4).map(t => `<span class="tag user clickable" ${tagClick(t)} title="이 태그로 검색">${escapeHTML(t)}</span>`).join('');
    const charHTML = charTags.slice(0, 3).map(t => `<span class="tag char clickable" ${tagClick(t)} title="이 태그로 검색">${escapeHTML(t)}</span>`).join('');
    const tagHTML = tags.slice(0, 3).map(t => `<span class="tag clickable" ${tagClick(t)} title="이 태그로 검색">${escapeHTML(t)}</span>`).join('');
    const scoreHTML = showScore && item.score ? `<span class="score-badge">${(item.score * 100).toFixed(1)}%</span>` : '';

    const copyTitle = '복사';
    const favTitle = item.favorite ? '즐겨찾기 해제' : '즐겨찾기';
    const hideTitle = item.hidden ? '숨김 해제' : '숨기기';
    const hideIcon = item.hidden ? '↺' : '✕';
    const hideClass = item.hidden ? 'show' : 'hide';

    card.innerHTML = `
        <div class="card-actions">
            <button class="icon-btn fav${item.favorite ? ' active' : ''}" title="${favTitle}"
                onclick="event.stopPropagation(); toggleFavorite(${item.id}, this)">★</button>
            <button class="icon-btn ${hideClass}" title="${hideTitle}"
                onclick="event.stopPropagation(); toggleHidden(${item.id}, this)">${hideIcon}</button>
        </div>
        <button class="copy-btn" title="${copyTitle}" onclick="event.stopPropagation(); copyImageToClipboard(${item.id}, this)">복사</button>
        <img src="${item.thumb_url || item.image_url}" alt="${escapeHTML(item.filename)}" loading="lazy"
             onerror="this.style.display='none'">
        <div class="card-info">
            <div class="card-filename"><span class="filename-text">${escapeHTML(item.filename)}</span>${scoreHTML}</div>
            ${(userHTML || charHTML || tagHTML) ? `<div class="card-tags">${charHTML}${userHTML}${tagHTML}</div>` : ''}
        </div>
    `;
    return card;
}

function parseTags(s) {
    return s ? s.split(',').map(t => t.trim()).filter(Boolean) : [];
}

async function toggleFavorite(id, btn) {
    const card = btn.closest('.card');
    const next = !card.classList.contains('favorited');
    try {
        const res = await fetch(`/api/image/${id}/state`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({favorite: next}),
        });
        const data = await res.json();
        if (!res.ok || data.error) throw new Error(data.error || res.statusText);
        card.classList.toggle('favorited', data.favorite);
        btn.classList.toggle('active', data.favorite);
        btn.title = data.favorite ? '즐겨찾기 해제' : '즐겨찾기';
        loadCounts();
        if (currentView === 'favorite' && !data.favorite) card.remove();
    } catch (e) {
        alert('즐겨찾기 변경 실패: ' + e.message);
    }
}

async function toggleHidden(id, btn) {
    const card = btn.closest('.card');
    const next = !card.classList.contains('hidden-card');
    try {
        const res = await fetch(`/api/image/${id}/state`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({hidden: next}),
        });
        const data = await res.json();
        if (!res.ok || data.error) throw new Error(data.error || res.statusText);
        card.classList.toggle('hidden-card', data.hidden);
        btn.textContent = data.hidden ? '↺' : '✕';
        btn.title = data.hidden ? '숨김 해제' : '숨기기';
        btn.classList.toggle('show', data.hidden);
        btn.classList.toggle('hide', !data.hidden);
        loadCounts();
        if ((currentView === 'all' && data.hidden) || (currentView === 'hidden' && !data.hidden) || (currentView === 'favorite' && data.hidden)) {
            card.remove();
        }
    } catch (e) {
        alert('숨김 변경 실패: ' + e.message);
    }
}

function openModalAt(idx) {
    if (idx < 0 || idx >= cardData.length) return;
    modalIndex = idx;
    renderModalBody(cardData[idx]);
    document.getElementById('modal').classList.add('active');
    document.addEventListener('keydown', escHandler);
    updateModalNavState();
}

function openModal(item) {
    const idx = cardData.findIndex(d => d.id === item.id);
    openModalAt(idx >= 0 ? idx : 0);
}

function modalPrev() {
    if (modalIndex > 0) openModalAt(modalIndex - 1);
}
function modalNext() {
    if (modalIndex < cardData.length - 1) openModalAt(modalIndex + 1);
}
function updateModalNavState() {
    document.getElementById('modalPrev').disabled = modalIndex <= 0;
    document.getElementById('modalNext').disabled = modalIndex >= cardData.length - 1;
    document.getElementById('modalCounter').textContent = cardData.length > 0 ? `${modalIndex + 1} / ${cardData.length}` : '';
}

async function loadCharSuggestions(imageId) {
    const box = document.getElementById('charSuggestBox');
    if (!box) return;
    box.style.display = 'none';
    box.innerHTML = '';
    try {
        const res = await fetch(`/api/image/${imageId}/suggest_chars?min_score=0.70`);
        const data = await res.json();
        if (!res.ok) return;
        const cands = data.candidates || [];
        if (cands.length === 0) return;
        box.innerHTML = `
            <div class="char-suggest-label">추천 (학습된 캐릭터)</div>
            <div class="char-suggest-chips">
                ${cands.map(c => {
                    const pct = Math.round(c.score * 100);
                    return `<button class="suggest-chip" onclick="acceptSuggestion(${imageId}, '${escapeAttr(c.name)}', this)" title="${pct}% 일치 · ${c.count}장 학습">
                        ${escapeHTML(c.name)} <span class="suggest-pct">${pct}%</span>
                    </button>`;
                }).join('')}
            </div>
        `;
        box.style.display = '';
    } catch (e) { /* silent — 추천은 부가기능 */ }
}

async function acceptSuggestion(imageId, name, btn) {
    btn.disabled = true;
    // 현재 wd_chars_ko 가져와서 추가
    const item = cardData.find(d => d.id === imageId);
    if (!item) return;
    const current = parseTags(item.wd_chars_ko || '');
    if (current.includes(name)) { btn.remove(); return; }
    const next = [...current, name];
    try {
        const res = await fetch(`/api/image/${imageId}/field_tags`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({field: 'wd_chars_ko', tags: next}),
        });
        const data = await res.json();
        if (!res.ok || data.error) throw new Error(data.error || res.statusText);
        // cardData 갱신 + 모달/카드 동기화
        const idx = cardData.findIndex(d => d.id === imageId);
        if (idx >= 0) cardData[idx].wd_chars_ko = data.tags.join(', ');
        renderModalBody(cardData[idx]);
    } catch (e) {
        alert('실패: ' + e.message);
        btn.disabled = false;
    }
}

function closeModal(e) {
    if (e.target === document.getElementById('modal') || !e) {
        document.getElementById('modal').classList.remove('active');
        document.removeEventListener('keydown', escHandler);
    }
}

function escHandler(e) {
    const tag = (e.target && e.target.tagName) || '';
    const inField = tag === 'INPUT' || tag === 'TEXTAREA';
    if (e.key === 'Escape') {
        document.getElementById('modal').classList.remove('active');
        document.removeEventListener('keydown', escHandler);
    } else if (!inField && e.key === 'ArrowLeft') {
        e.preventDefault();
        modalPrev();
    } else if (!inField && e.key === 'ArrowRight') {
        e.preventDefault();
        modalNext();
    }
}

async function findSimilar(id) {
    document.getElementById('modal').classList.remove('active');
    document.removeEventListener('keydown', escHandler);
    currentMode = 'similar';
    currentQuery = '';
    grid.innerHTML = ''; cardData = [];
    status.textContent = '비슷한 이미지 찾는 중...';
    loadMoreBtn.style.display = 'none';
    try {
        const res = await fetch(`/api/similar/${id}?limit=${PAGE_SIZE}&view=${currentView}${filterQueryString()}`);
        const data = await res.json();
        if (!res.ok || data.error) {
            status.textContent = '오류: ' + (data.error || res.statusText);
            return;
        }
        if (data.results.length === 0) {
            status.textContent = '비슷한 이미지 없음';
            return;
        }
        status.textContent = `#${id}와 비슷한 이미지 ${data.results.length}개`;
        data.results.forEach(item => grid.appendChild(createCard(item, true)));
    } catch (e) {
        status.textContent = '요청 실패: ' + e.message;
    }
}

function toggleSelection(id, card) {
    if (selected.has(id)) {
        selected.delete(id);
        card.classList.remove('selected');
    } else {
        selected.add(id);
        card.classList.add('selected');
    }
    updateBulkBar();
}

function clearSelection() {
    selected.clear();
    grid.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
    updateBulkBar();
}

function updateBulkBar() {
    const bar = document.getElementById('bulkBar');
    const cnt = document.getElementById('bulkCount');
    if (selected.size === 0) {
        bar.style.display = 'none';
    } else {
        bar.style.display = 'flex';
        cnt.textContent = `${selected.size}개 선택됨`;
    }
}

async function bulkAction(field, value) {
    if (selected.size === 0) return;
    const ids = Array.from(selected);
    let ok = 0, fail = 0;
    for (const id of ids) {
        try {
            const res = await fetch(`/api/image/${id}/state`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({[field]: value}),
            });
            if (res.ok) ok++;
            else fail++;
        } catch { fail++; }
    }
    clearSelection();
    loadCounts();
    refreshCurrentView();
    if (fail > 0) alert(`완료: ${ok}건, 실패: ${fail}건`);
}

async function bulkAddTag() {
    if (selected.size === 0) return;
    const input = prompt(`선택한 ${selected.size}장에 추가할 태그 (쉼표로 여러 개):`);
    if (!input) return;
    const newTags = input.split(',').map(t => t.trim()).filter(Boolean);
    if (newTags.length === 0) return;
    const ids = Array.from(selected);
    let ok = 0, fail = 0;
    for (const id of ids) {
        try {
            const item = cardData.find(d => d.id === id);
            const cur = item && item.user_tags ? item.user_tags.split(',').map(t => t.trim()).filter(Boolean) : [];
            const merged = [...cur];
            for (const t of newTags) if (!merged.includes(t)) merged.push(t);
            await saveUserTags(id, merged);
            if (item) item.user_tags = merged.join(',');
            ok++;
        } catch { fail++; }
    }
    clearSelection();
    refreshCurrentView();
    alert(`태그 추가 완료: ${ok}건${fail > 0 ? `, 실패: ${fail}건` : ''}`);
}

function refreshCurrentView() {
    if (currentMode === 'browse') {
        browseOffset = 0;
        grid.innerHTML = ''; cardData = [];
        loadBrowse();
    } else if (currentMode === 'search' && currentQuery) {
        doSearch();
    }
}

async function togglePopoverMenu(name) {
    const popover = document.getElementById(name + 'Popover');
    if (!popover) return;
    document.querySelectorAll('.popover').forEach(p => {
        if (p !== popover) p.style.display = 'none';
    });
    const isOpen = popover.style.display === 'block';
    if (isOpen) {
        popover.style.display = 'none';
    } else {
        if (name === 'info') await refreshInfoPopover();
        // 버튼 바로 아래에 띄우기 (position: fixed 기준)
        const btn = document.querySelector(`button[onclick*="togglePopoverMenu('${name}')"]`);
        if (btn) {
            const r = btn.getBoundingClientRect();
            popover.style.top = (r.bottom + 6) + 'px';
            popover.style.right = (window.innerWidth - r.right) + 'px';
            popover.style.left = 'auto';
        }
        popover.style.display = 'block';
    }
}

const errorLog = [];  // 최근 20개만 유지
const ERROR_MAX = 20;

function logError(msg, context) {
    errorLog.unshift({
        time: new Date(),
        msg: String(msg || '(에러 메시지 없음)'),
        ctx: context || '',
    });
    if (errorLog.length > ERROR_MAX) errorLog.length = ERROR_MAX;
    updateErrorBadge();
    renderErrorsPopover();
}

function updateErrorBadge() {
    const badge = document.getElementById('errorBadge');
    if (!badge) return;
    if (errorLog.length === 0) {
        badge.style.display = 'none';
        badge.removeAttribute('data-count');
    } else {
        badge.style.display = '';
        badge.setAttribute('data-count', errorLog.length > 99 ? '99+' : String(errorLog.length));
    }
}

function renderErrorsPopover() {
    const body = document.getElementById('errorsPopoverBody');
    if (!body) return;
    if (errorLog.length === 0) {
        body.innerHTML = '<div style="color:var(--text-muted);text-align:center;padding:20px 0">에러 없음</div>';
        return;
    }
    body.innerHTML = errorLog.map(e => {
        const t = e.time;
        const hh = String(t.getHours()).padStart(2, '0');
        const mm = String(t.getMinutes()).padStart(2, '0');
        const ss = String(t.getSeconds()).padStart(2, '0');
        return `<div class="error-row">
            <div class="err-time">${hh}:${mm}:${ss}</div>
            <div class="err-msg">${escapeHTML(e.msg)}</div>
            ${e.ctx ? `<div class="err-ctx">${escapeHTML(e.ctx)}</div>` : ''}
        </div>`;
    }).join('');
}

function clearErrors() {
    errorLog.length = 0;
    updateErrorBadge();
    renderErrorsPopover();
}

// 처리되지 않은 JS 에러 / Promise rejection 자동 캐치
window.addEventListener('error', (e) => {
    logError(e.message || 'Script error', `${e.filename || ''}:${e.lineno || ''}`);
});
window.addEventListener('unhandledrejection', (e) => {
    const reason = e.reason && (e.reason.message || e.reason.toString()) || 'Promise rejected';
    logError(reason, 'unhandledrejection');
});

// alert() 호출 자동 후킹 — 메시지에 "오류"/"실패"/"에러" 포함되면 popover에도 기록.
// 기존 alert() 호출들을 일일이 logError로 바꿀 필요 없음.
(function hookAlertForErrorLog() {
    const orig = window.alert;
    window.alert = function(msg) {
        if (typeof msg === 'string' && /(오류|실패|에러|error)/i.test(msg)) {
            logError(msg);
        }
        return orig.call(window, msg);
    };
})();
