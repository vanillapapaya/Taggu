let guideIndex = 0;

function openGuide() {
    guideIndex = 0;
    renderGuide();
    document.getElementById('guideModal').classList.add('active');
}

function closeGuide(e) {
    if (!e || e.target === document.getElementById('guideModal')) {
        document.getElementById('guideModal').classList.remove('active');
        localStorage.setItem('yoink.guideSeen', 'true');
    }
}

function renderGuide() {
    const step = GUIDE_STEPS[guideIndex];
    document.getElementById('guideBody').innerHTML = `
        <div class="guide-title">${step.title}</div>
        <div class="guide-text">${step.html}</div>
    `;
    document.getElementById('guideDots').innerHTML =
        GUIDE_STEPS.map((_, i) => `<span class="dot${i === guideIndex ? ' active' : ''}"></span>`).join('');
    document.getElementById('guidePrevBtn').disabled = guideIndex === 0;
    const nextBtn = document.getElementById('guideNextBtn');
    const isLast = guideIndex === GUIDE_STEPS.length - 1;
    nextBtn.textContent = isLast ? '시작하기!' : '다음 →';
}

function guideNext() {
    if (guideIndex < GUIDE_STEPS.length - 1) {
        guideIndex++;
        renderGuide();
    } else {
        closeGuide();
    }
}

function guidePrev() {
    if (guideIndex > 0) {
        guideIndex--;
        renderGuide();
    }
}

(function autoShowGuideFirstTime() {
    if (localStorage.getItem('yoink.guideSeen') !== 'true') {
        // 페이지 로드 직후 가이드 자동 표시 (DOM 준비 후 약간 지연)
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(openGuide, 400);
        });
    }
})();

    }

async function pollUntilUp() {
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    const elem = document.getElementById('progress');
    const text = document.getElementById('progressText');
    const fill = document.getElementById('progressFill');
    elem.style.display = 'block';
    elem.classList.remove('done', 'error');
    text.textContent = '서버 재시작 중... ~5초';
    fill.style.width = '15%';

    let downSeen = false;
    const maxAttempts = 300; // 60초 (200ms × 300)
    for (let i = 0; i < maxAttempts; i++) {
        await new Promise(r => setTimeout(r, 200));
        try {
            const res = await fetch('/api/index/status', { cache: 'no-store' });
            if (res.ok) {
                if (downSeen) {
                    text.textContent = '✓ 서버 준비됨, 페이지 새로고침';
                    fill.style.width = '100%';
                    elem.classList.add('done');
                    setTimeout(() => location.reload(), 300);
                    return;
                }
            } else {
                downSeen = true;
            }
        } catch {
            downSeen = true;
        }
        const pct = 15 + Math.min(80, (i / maxAttempts) * 80);
        fill.style.width = `${pct}%`;
    }
    text.textContent = '재시작 시간 초과 — 콘솔 창을 확인하세요';
    elem.classList.add('error');
}

}

function renderCharTagChips(imageId, tags) {
    return tags.map(t => `<span class="tag char" draggable="true" ondragstart="onTagDragStart(event, ${imageId}, 'char', '${escapeAttr(t)}')" ondblclick="startEditTag(this, ${imageId}, 'wd_chars_ko', '${escapeAttr(t)}')" title="더블클릭 편집 / 끌어다 놓으면 내 태그 또는 AI 태그로"><span class="tag-label">${escapeHTML(t)}</span><span class="tag-x" onclick="removeTagFromField(${imageId}, 'wd_chars_ko', '${escapeAttr(t)}', this)" title="제거">×</span></span>`).join('');
}

function renderAiTagChips(imageId, tags) {
    return tags.map(t => `<span class="tag" draggable="true" ondragstart="onTagDragStart(event, ${imageId}, 'ai', '${escapeAttr(t)}')" ondblclick="startEditTag(this, ${imageId}, 'tags', '${escapeAttr(t)}')" title="더블클릭 편집 / 끌어다 놓으면 내 태그 또는 캐릭터로"><span class="tag-label">${escapeHTML(t)}</span><span class="tag-x" onclick="removeTagFromField(${imageId}, 'tags', '${escapeAttr(t)}', this)" title="제거">×</span></span>`).join('');
}

async function removeTagFromField(imageId, field, tag, el) {
    const item = cardData.find(d => d.id === imageId);
    if (!item) return;
    const current = parseTags(item[field] || '');
    const next = current.filter(t => t !== tag);
    try {
        const res = await fetch(`/api/image/${imageId}/field_tags`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({field, tags: next}),
        });
        const data = await res.json();
        if (!res.ok || data.error) throw new Error(data.error || res.statusText);

        const sep = field === 'user_tags' ? ',' : ', ';
        const itemIdx = cardData.findIndex(d => d.id === imageId);
        if (itemIdx >= 0) cardData[itemIdx][field] = data.tags.join(sep);

        if (modalIndex >= 0 && cardData[modalIndex] && cardData[modalIndex].id === imageId) {
            renderModalBody(cardData[modalIndex]);
        }
        const userT = parseTags(cardData[itemIdx].user_tags || '');
        const charT = parseTags(cardData[itemIdx].wd_chars_ko || '');
        const aiT   = parseTags(cardData[itemIdx].tags || '');
        _syncCardChipsAfterPromote(imageId, userT, charT, aiT);
    } catch (e) {
        alert('태그 제거 실패: ' + e.message);
    }
}

function startEditTag(chipEl, imageId, field, oldTag) {
    const label = chipEl.querySelector('.tag-label');
    if (!label || label.isContentEditable) return;

    const wasDraggable = chipEl.draggable;
    chipEl.draggable = false;
    label.contentEditable = 'true';
    label.classList.add('editing');
    label.focus();

    const range = document.createRange();
    range.selectNodeContents(label);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);

    let done = false;
    const finish = (commit) => {
        if (done) return;
        done = true;
        label.contentEditable = 'false';
        label.classList.remove('editing');
        chipEl.draggable = wasDraggable;
        label.onkeydown = null;
        label.onblur = null;

        const newTag = label.textContent.trim();
        if (!commit) { label.textContent = oldTag; return; }
        if (newTag === oldTag) return;
        commitTagEdit(imageId, field, oldTag, newTag);
    };

    label.onkeydown = (e) => {
        if (e.key === 'Enter') { e.preventDefault(); finish(true); }
        else if (e.key === 'Escape') { e.preventDefault(); finish(false); }
    };
    label.onblur = () => finish(true);
}

async function commitTagEdit(imageId, field, oldTag, newTag) {
    const item = cardData.find(d => d.id === imageId);
    if (!item) return;
    const current = parseTags(item[field] || '');
    const idx = current.indexOf(oldTag);
    if (idx < 0) { alert('태그를 찾을 수 없음 (다른 곳에서 이미 수정됐을 수 있음)'); return; }
    if (!newTag) current.splice(idx, 1);
    else current[idx] = newTag;

    try {
        const res = await fetch(`/api/image/${imageId}/field_tags`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({field, tags: current}),
        });
        const data = await res.json();
        if (!res.ok || data.error) throw new Error(data.error || res.statusText);

        const sep = field === 'user_tags' ? ',' : ', ';
        const itemIdx = cardData.findIndex(d => d.id === imageId);
        if (itemIdx >= 0) cardData[itemIdx][field] = data.tags.join(sep);

        if (modalIndex >= 0 && cardData[modalIndex] && cardData[modalIndex].id === imageId) {
            renderModalBody(cardData[modalIndex]);
        }
        // 카드 그리드 칩 동기화 (user/char/AI 모두 갱신)
        const userT = parseTags(cardData[itemIdx].user_tags || '');
        const charT = parseTags(cardData[itemIdx].wd_chars_ko || '');
        const aiT   = parseTags(cardData[itemIdx].tags || '');
        _syncCardChipsAfterPromote(imageId, userT, charT, aiT);
    } catch (e) {
        alert('편집 실패: ' + e.message);
    }
}

function onTagDragStart(e, imageId, source, tag) {
    e.dataTransfer.setData('application/json', JSON.stringify({imageId, source, tag}));
    e.dataTransfer.effectAllowed = 'move';
}

function onTagDragOver(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    e.currentTarget.classList.add('drop-target');
}

function onTagDragLeave(e) {
    e.currentTarget.classList.remove('drop-target');
}

function onTagDrop(e, target) {
    e.preventDefault();
    e.currentTarget.classList.remove('drop-target');
    try {
        const data = JSON.parse(e.dataTransfer.getData('application/json'));
        if (data.source === target) return;
        moveTag(data.imageId, data.tag, data.source, target);
    } catch (err) { console.error(err); }
}

async function moveTag(imageId, tag, source, target) {
    if (source === target) return;
    try {
        const res = await fetch(`/api/image/${imageId}/move_tag`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({tag, source, target}),
        });
        const data = await res.json();
        if (!res.ok || data.error) throw new Error(data.error || res.statusText);

        const idx = cardData.findIndex(d => d.id === imageId);
        if (idx >= 0) {
            cardData[idx].user_tags = data.user_tags.join(',');
            cardData[idx].wd_chars_ko = data.wd_chars_ko.join(', ');
            cardData[idx].tags = data.tags.join(', ');
        }
        if (modalIndex >= 0 && cardData[modalIndex] && cardData[modalIndex].id === imageId) {
            renderModalBody(cardData[modalIndex]);
        }
        _syncCardChipsAfterPromote(imageId, data.user_tags, data.wd_chars_ko, data.tags);
    } catch (e) {
        alert('실패: ' + e.message);
    }
}

function _syncCardChipsAfterPromote(id, userTags, charTags, aiTags) {
    const card = grid.querySelector(`.card[data-id="${id}"]`);
    if (!card) return;
    const cardInfo = card.querySelector('.card-info');
    if (!cardInfo) return;

    let tagsEl = cardInfo.querySelector('.card-tags');
    // aiTags 인자가 있으면 갱신, 없으면 기존 유지
    const genericHTML = aiTags !== undefined
        ? aiTags.slice(0, 3).map(t => `<span class="tag clickable" onclick="event.stopPropagation(); searchByTag('${escapeAttr(t)}')" title="이 태그로 검색">${escapeHTML(t)}</span>`).join('')
        : (tagsEl
            ? Array.from(tagsEl.querySelectorAll('.tag:not(.user):not(.char):not(.work)'))
                  .map(el => el.outerHTML).join('')
            : '');
    const userHTML = userTags.slice(0, 4).map(t => `<span class="tag user clickable" onclick="event.stopPropagation(); searchByTag('${escapeAttr(t)}')" title="이 태그로 검색">${escapeHTML(t)}</span>`).join('');
    const charHTML = charTags.slice(0, 3).map(t => `<span class="tag char clickable" onclick="event.stopPropagation(); searchByTag('${escapeAttr(t)}')" title="이 태그로 검색">${escapeHTML(t)}</span>`).join('');
    const combined = charHTML + userHTML + genericHTML;

    if (combined) {
        if (!tagsEl) {
            tagsEl = document.createElement('div');
            tagsEl.className = 'card-tags';
            cardInfo.appendChild(tagsEl);
        }
        tagsEl.innerHTML = combined;
    } else if (tagsEl) {
        tagsEl.remove();
    }
}

async function saveUserTags(id, tags) {
    const res = await fetch(`/api/image/${id}/tags`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({tags}),
    });
    const data = await res.json();
    if (!res.ok || data.error) throw new Error(data.error || res.statusText);
    return data;
}

function _refreshModalUserTags(id, tags) {
    const box = document.getElementById('userTagsBox');
    if (box) {
        if (tags.length === 0) {
            box.innerHTML = '<span class="folder-empty" style="padding:0;font-size:12px">없음</span>';
        } else {
            box.innerHTML = renderUserTagChips(id, tags);
        }
    }
    _syncCardUserChips(id, tags);
}

function _syncCardUserChips(id, userTags) {
    // cardData 갱신
    const idx = cardData.findIndex(d => d.id === id);
    if (idx >= 0) cardData[idx].user_tags = userTags.join(',');

    const card = grid.querySelector(`.card[data-id="${id}"]`);
    if (!card) return;

    let tagsEl = card.querySelector('.card-tags');
    // 기존 사용자 chip 제거
    if (tagsEl) tagsEl.querySelectorAll('.tag.user').forEach(t => t.remove());

    // 새 사용자 chip HTML (카드는 4개까지만 노출)
    const userHTML = userTags.slice(0, 4).map(t => `<span class="tag user clickable" onclick="event.stopPropagation(); searchByTag('${escapeAttr(t)}')" title="이 태그로 검색">${escapeHTML(t)}</span>`).join('');

    if (userHTML) {
        if (!tagsEl) {
            tagsEl = document.createElement('div');
            tagsEl.className = 'card-tags';
            const info = card.querySelector('.card-info');
            const desc = card.querySelector('.card-desc');
            if (info) {
                if (desc) info.insertBefore(tagsEl, desc);
                else info.appendChild(tagsEl);
            }
        }
        tagsEl.insertAdjacentHTML('afterbegin', userHTML);
    } else if (tagsEl && tagsEl.children.length === 0) {
        tagsEl.remove();
    }
}

async function addUserTagFromInput(id) {
    const input = document.getElementById('userTagInput');
    if (!input) return;
    const value = input.value.trim();
    if (!value) return;
    const newTags = value.split(',').map(t => t.trim()).filter(Boolean);
    const current = parseTagsFromBox();
    const merged = [...current];
    for (const t of newTags) {
        if (!merged.includes(t)) merged.push(t);
    }
    try {
        const data = await saveUserTags(id, merged);
        _refreshModalUserTags(id, data.tags);
        input.value = '';
    } catch (e) {
        alert('태그 저장 실패: ' + e.message);
    }
}

async function removeUserTag(id, tag, el) {
    const current = parseTagsFromBox();
    const next = current.filter(t => t !== tag);
    try {
        const data = await saveUserTags(id, next);
        _refreshModalUserTags(id, data.tags);
    } catch (e) {
        alert('태그 제거 실패: ' + e.message);
    }
}

function parseTagsFromBox() {
    const box = document.getElementById('userTagsBox');
    if (!box) return [];
    return Array.from(box.querySelectorAll('.tag.user .tag-label'))
        .map(el => el.textContent.trim())
        .filter(Boolean);
}

async function modalToggleHidden(id, btn) {
    const next = !btn.classList.contains('active-hide');
    try {
        const res = await fetch(`/api/image/${id}/state`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({hidden: next}),
        });
        const data = await res.json();
        if (!res.ok || data.error) throw new Error(data.error || res.statusText);
        btn.classList.toggle('active-hide', data.hidden);
        btn.textContent = data.hidden ? '↺ 숨김 해제' : '✕ 숨기기';
        const card = grid.querySelector(`.card[data-id="${id}"]`);
        if (card) card.classList.toggle('hidden-card', data.hidden);
        loadCounts();
    } catch (e) { alert('실패: ' + e.message); }
}

async function pollProgress() {
    const elem = document.getElementById('progress');
    elem.style.display = 'block';

    // 이전 poll 중단 (재호출 시 stopFlag flip)
    if (pollTimer) { pollTimer.stopped = true; }
    const myToken = pollTimer = { stopped: false };

    while (!myToken.stopped) {
        let done = false;
        try {
            const res = await fetch('/api/index/status');
            const s = await res.json();
            renderProgress(s);
            if (s.status === 'idle' || s.status === 'done' || s.status === 'error') {
                done = true;
            }
        } catch (e) { console.error(e); }

        if (done) {
            myToken.stopped = true;
            await loadFolders();
            loadCounts();
            if (currentMode === 'browse') {
                browseOffset = 0;
                grid.innerHTML = ''; cardData = [];
                await loadBrowse();
            }
            return;
        }
        await new Promise(r => setTimeout(r, 1000));
    }
}

function renderProgress(s) {
    const elem = document.getElementById('progress');
    const text = document.getElementById('progressText');
    const fill = document.getElementById('progressFill');

    elem.classList.remove('done', 'error');

    let label = '';
    let pct = 0;

    if (s.status === 'loading_model') {
        label = s.message || 'AI 모델 준비 중...';
        pct = 0;
    } else if (s.status === 'running') {
        pct = s.total > 0 ? Math.round((s.current / s.total) * 100) : 0;
        const file = s.current_file || '...';
        label = `[${s.folder}] 분석 중: ${s.current}/${s.total} (${pct}%) — ${file} | 완료 ${s.success}, 오류 ${s.errors}, 건너뜀 ${s.skipped}`;
    } else if (s.status === 'done') {
        pct = 100;
        label = `✓ [${s.folder}] ${s.message}`;
        elem.classList.add('done');
    } else if (s.status === 'error') {
        pct = 0;
        label = `오류: ${s.message}`;
        elem.classList.add('error');
    } else {
        label = '';
        pct = 0;
    }

    text.textContent = label;
    fill.style.width = `${pct}%`;
}

async function loadFolders() {
    try {
        const res = await fetch('/api/folders');
        const data = await res.json();
        const list = document.getElementById('folderList');
        if (!data.folders || data.folders.length === 0) {
            list.innerHTML = '<div class="folder-empty">아직 등록된 폴더가 없습니다. 위에서 경로를 입력하고 [인덱싱]을 누르세요.</div>';
            return;
        }
        const totalMissing = data.wd_total_missing || 0;
        const headerHTML = totalMissing > 0
            ? `<div class="folder-empty" style="color:var(--warn);margin-bottom:8px">아직 캐릭터 인식이 안 된 이미지 ${totalMissing}장. 위쪽 [캐릭터 인식] 버튼을 누르세요.</div>`
            : '';
        list.innerHTML = headerHTML + data.folders.map(f => `
            <div class="folder-item">
                <div class="folder-info">
                    <div class="folder-path">${escapeHTML(f.path)}</div>
                    <div class="folder-meta">${f.image_count}장 · 마지막 추가: ${f.last_indexed_at || '—'}${f.wd_missing > 0 ? ` · 캐릭터 인식 안 됨 ${f.wd_missing}장` : ''}</div>
                </div>
                <div style="display:flex;gap:6px">
                    <button onclick="useFolder('${escapeAttr(f.path)}')">경로 채우기</button>
                    <button onclick="reindexFolder('${escapeAttr(f.path)}')" title="이 폴더의 모든 이미지를 다시 분석">전체 다시 분석</button>
                </div>
            </div>
        `).join('');
    } catch (e) {
        console.error(e);
    }
}

function useFolder(path) {
    document.getElementById('folderInput').value = path;
    document.getElementById('folderInput').focus();
}

function toggleToolbar() {
    const t = document.getElementById('toolbar');
    const willShow = t.style.display === 'none';
    t.style.display = willShow ? '' : 'none';
    document.getElementById('toolbarToggle').classList.toggle('active', willShow);
    localStorage.setItem('yoink.toolbar', willShow ? 'show' : 'hide');
}

(function initToolbarVisibility() {
    if (localStorage.getItem('yoink.toolbar') === 'show') {
        const t = document.getElementById('toolbar');
        const btn = document.getElementById('toolbarToggle');
        if (t) t.style.display = '';
        if (btn) btn.classList.add('active');
    }
})();

(function initDevMode() {
    if (localStorage.getItem('yoink.devMode') === 'true') {
        document.body.classList.add('dev-mode');
    }
})();

function toggleDevMode(on) {
    document.body.classList.toggle('dev-mode', on);
    localStorage.setItem('yoink.devMode', on ? 'true' : 'false');
}

function toggleFolderPanel() {
    const p = document.getElementById('folderPanel');
    p.style.display = p.style.display === 'none' ? 'block' : 'none';
}

async function copyImageToClipboard(imageId, btn) {
    const original = btn.textContent;
    btn.disabled = true;
    try {
        if (isLocalAccess) {
            btn.textContent = '복사 중...';
            const res = await fetch(`/api/image/${imageId}/copy`, { method: 'POST' });
            const data = await res.json();
            if (!res.ok || data.error) throw new Error(data.error || res.statusText);
            btn.textContent = '✓ 복사됨';
        } else {
            const item = cardData.find(c => c.id === imageId);
            if (!item) throw new Error('이미지 정보 없음');
            const isGif = /\.gif$/i.test(item.filename);

            if (isGif || !canUseClipboardAPI) {
                btn.textContent = '다운로드 중...';
                const a = document.createElement('a');
                a.href = item.image_url;
                a.download = item.filename;
                document.body.appendChild(a);
                a.click();
                a.remove();
                btn.textContent = '✓ 다운로드';
            } else {
                btn.textContent = '복사 중...';
                const pngBlobPromise = (async () => {
                    const blob = await fetch(item.image_url).then(r => r.blob());
                    return blob.type === 'image/png' ? blob : await convertImageToPng(blob);
                })();
                await navigator.clipboard.write([
                    new ClipboardItem({ 'image/png': pngBlobPromise })
                ]);
                btn.textContent = '✓ 복사됨';
            }
        }
        setTimeout(() => { btn.textContent = original; btn.disabled = false; }, 1500);
    } catch (e) {
        alert('복사 실패: ' + e.message);
        btn.textContent = original;
        btn.disabled = false;
    }
}

function convertImageToPng(blob) {
    return new Promise((resolve, reject) => {
        const url = URL.createObjectURL(blob);
        const img = new Image();
        img.onload = () => {
            URL.revokeObjectURL(url);
            const canvas = document.createElement('canvas');
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            canvas.getContext('2d').drawImage(img, 0, 0);
            canvas.toBlob(b => b ? resolve(b) : reject(new Error('PNG 변환 실패')), 'image/png');
        };
        img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('이미지 로드 실패')); };
        img.src = url;
    });
}

function escapeHTML(str) {
    if (str === null || str === undefined) return '';
    const div = document.createElement('div');
    div.textContent = String(str);
    return div.innerHTML;
}

function escapeAttr(str) {
    if (str === null || str === undefined) return '';
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/'/g, '&#39;')
        .replace(/"/g, '&quot;')
        .replace(/\\/g, '\\\\');
}
